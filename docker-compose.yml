services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-lernedeutsch_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    # Locally:     BOT_IMAGE is unset → docker compose build creates lernedeutsch:local
    # Production:  BOT_IMAGE is set to the GHCR image tag by the deploy step
    image: ${BOT_IMAGE:-lernedeutsch:local}
    build:
      context: .
    env_file: .env
    environment:
      DB_HOST: db          # override .env so the bot always reaches the compose DB
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
