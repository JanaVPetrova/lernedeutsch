default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV['DB_HOST'] || 'localhost' %>
  port: <%= ENV['DB_PORT'] || 5432 %>
  username: <%= ENV['DB_USERNAME'] || 'postgres' %>
  password: <%= ENV['DB_PASSWORD'] %>
  pool: 5

development:
  <<: *default
  database: <%= ENV['DB_NAME'] || 'lernedeutsch_development' %>

test:
  <<: *default
  database: lernedeutsch_test

production:
  <<: *default
  database: lernedeutsch
